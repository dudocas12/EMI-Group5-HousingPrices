# MLOps Pipeline Configuration

paths:
  raw_baseline: "data/raw/baseline.csv"
  dvc_tracker: "data/raw/baseline.csv.dvc"
  train_data: "data/processed/train.csv"
  test_data: "data/processed/test.csv"
  model_dir: "models"
  future_batches: "data/raw/future_batches.csv"
  cursor: "data/raw/sim_cursor.txt"

mock_api:
  update_frequency_days: 1

mlflow:
  experiment_name: "Housing_Prices_Baseline"

preprocessing:
  test_size: 0.2
  random_state: 42

training:
  random_state: 42
  random_forest:
    n_estimators: 100
    max_depth: 10
  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1